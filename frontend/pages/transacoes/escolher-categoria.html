<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolso Direito - Selecionar Categoria</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../static/styles/style.css">
</head>
<body class="app-body">

    <div class="app-shell">
        <header class="app-header-back">
            <button class="back-btn" id="btn-voltar" onclick="history.back()" aria-label="Voltar">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <h2>Novo Gasto</h2>
        </header>

        <div class="selection-header">
            <h3>Valor do Gasto</h3>
            <h2 id="valorDisplay">R$ 0,00</h2>
        </div>

        <h4 class="mt-1 mb-3" style="color: var(--bd-dark);">Selecione a Categoria:</h4>

        <div class="selection-list" id="listaCategorias">
            <!-- Categorias renderizadas pelo JS -->
        </div>
    </div>

    <script>
        const categorias = ['Lazer', 'Transporte', 'Saúde', 'Alimentação', 'Moradia', 'Outros'];

        document.addEventListener('DOMContentLoaded', () => {
            const valor = localStorage.getItem('valorTemporario');
            if (valor) {
                document.getElementById('valorDisplay').innerText =
                    'R$ ' + parseFloat(valor).toFixed(2).replace('.', ',');
            } else {
                alert('Nenhum valor definido. Voltando...');
                window.location.href = 'teclado-valores.html?tipo=gasto';
            }

            const lista = document.getElementById('listaCategorias');
            categorias.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'menu-btn-wide';
                btn.textContent = cat;
                btn.onclick = () => selecionarCategoria(cat);
                lista.appendChild(btn);
            });
        });

        function selecionarCategoria(cat) {
            localStorage.setItem('categoriaTemporaria', cat);
            window.location.href = 'escolher-tipo-gasto.html';
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
