<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolso Direito - Login</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,500,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../static/styles/style.css">
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#2c3e50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform: rotate(45deg);">
                <rect x="3" y="3" width="18" height="18" rx="4" ry="4"></rect>
            </svg>
        </div>
        
        <h2>BOLSO DIREITO</h2>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Username ou E-mail</label>
                <input type="text" id="username" name="username" placeholder="Digite seu usuário" required>
            </div>
            
            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
            </div>
            
            <button type="submit" class="btn-primary">Entrar</button>
        </form>
        
        <div class="signup-link">
            Não possui conta? <a href="./criar-conta.html">Criar conta</a>
        </div>
    </div>

    <script>
        // Lógica simples de Front-End para redirecionamento
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Impede a página de recarregar
            
            const senha = document.getElementById('senha').value;
            
            // Simulação: se tiver qualquer senha, avança. 
            // No futuro, aqui entrará a validação com o localStorage.
            if(senha) {
                window.location.href = '../dashboard/overview.html';
            }
        });
    </script>
</body>
</html>
