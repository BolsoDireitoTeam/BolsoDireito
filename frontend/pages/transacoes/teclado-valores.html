<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolso Direito - Teclado de Valores</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../static/styles/style.css">
</head>

<body class="app-body calc-body" data-page="teclado-valores">

    <div class="calc-shell">
        <header class="app-header-back mb-3">
            <!-- Aqui temos a construção de um botão que serve para acessar o histório prévio antes de acessarmos esta respectiva página -->
            <button class="back-btn" id="btn-voltar" onclick="history.back()" aria-label="Voltar">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <h2 id="tituloTeclado">Digitar Valor</h2>
        </header>

        <!-- Campo de nome do Ganho (visivel apenas quando tipo=ganho) -->
        <div id="campoNomeGanho" class="nome-input-wrapper" style="display:none;">
            <label for="inputNomeGanho">Descrição (opcional)</label>
            <input type="text" id="inputNomeGanho" placeholder="Ex: Salário, Freelance..." autocomplete="off">
        </div>

        <div class="calc-display">
            <div class="calc-equation" id="visorEquacao"></div>
            <div class="calc-result" id="visorResultado">R$ 0,00</div>
        </div>

        <div class="calc-keypad">

            <!-- Aqui temos a construção de todos os botões existentes dentro da calculadora que estamos exibindo em nosso sistema -->
            <button class="calc-btn" onclick="inserir('1')">1</button>
            <button class="calc-btn" onclick="inserir('2')">2</button>
            <button class="calc-btn" onclick="inserir('3')">3</button>
            <button class="calc-btn op-btn" id="btn-apagar" onclick="apagar()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
                    <line x1="18" y1="9" x2="12" y2="15"></line>
                    <line x1="12" y1="9" x2="18" y2="15"></line>
                </svg>
            </button>
            <button class="calc-btn" onclick="inserir('4')">4</button>
            <button class="calc-btn" onclick="inserir('5')">5</button>
            <button class="calc-btn" onclick="inserir('6')">6</button>
            <button class="calc-btn op-btn" onclick="inserir('+')">+</button>
            <button class="calc-btn" onclick="inserir('7')">7</button>
            <button class="calc-btn" onclick="inserir('8')">8</button>
            <button class="calc-btn" onclick="inserir('9')">9</button>
            <button class="calc-btn op-btn" onclick="inserir('-')">−</button>
            <button class="calc-btn" onclick="inserir(',')"><span style="font-size:1.2rem">,</span></button>
            <button class="calc-btn" onclick="inserir('0')">0</button>
            <button class="calc-btn op-btn" id="btn-igual" onclick="calcular()">=</button>
            <button class="calc-btn op-btn" id="btn-limpar" onclick="limpar()">C</button>

        </div>

        <button class="bd-btn-primary confirm-value-btn" id="btn-confirmar" onclick="confirmarValor()">
            Confirmar Valor
        </button>
    </div>



    <!-- JS Stack: ordem obrigatória -->
    <script src="../../static/js/database.js"></script>
    <script src="../../static/js/engine.js"></script>
    <script src="../../static/js/ui.js"></script>
    <script> //TODO: Transformar este script em um arquivo .js separado do arquivo .html
        // Teclado de valores — lógica da calculadora (nativa nesta página)
        let expressao = '';
        const visorEq = document.getElementById('visorEquacao');
        const visorRes = document.getElementById('visorResultado');

        function formatar(v) { return 'R$ ' + v.toFixed(2).replace('.', ','); }

        function atualizar() {
            visorEq.innerText = expressao || '0'; // Se a expressão ainda for uma string vazia, o valor "0" será exibido.
            try {
                let expr = expressao.replaceAll(",", "."); // Substituindo todas as ocorrências de vírgula por ponto
                if (/[+\-]$/.test(expr)) expr = expr.slice(0, -1); // Se tivermos ao final da expressão os caracteres "-" ou "+", iremos desconsiderar os sinais neste caso.
                if (expr) {
                    visorRes.innerText = formatar(eval(expr));
                }
                else {
                    visorRes.innerText = 'R$ 0,00';
                }
            } catch (e) {
                visorRes.innerText = 'Err';
                visorEq.innerText = 'Err';
            }
        }

        function inserir(c) {
            const last = expressao.slice(-1); // Copiando o último elemento do array
            if (['+', '-'].includes(c) && ['+', '-'].includes(last)) return; // Este caso está considerando caso adicionemos operadores "+" ou "-" repetidas vezes, o que de fato deve ser ignorado. Seguindo esta lógica, ao adicionarmos um sinal, bloqueamos a adição de outro sinal.
            expressao += c; // Adicionando o elemento ao array
            atualizar(); // Atualizando o display
        }

        function apagar() { expressao = expressao.slice(0, -1); atualizar(); } // Opção utilizada para apagar apenas o último elemento registrado
        function limpar() { expressao = ''; atualizar(); } // Opção utilizada para apagar todas as operações registradas

        function calcular() {
            try {
                let expr = expressao.replace(/,/g, '.');
                expressao = eval(expr).toString().replace('.', ',');
                atualizar();
            } catch (e) {
                alert('Expressão inválida');
            }
        }
    </script>
    <script src="../../static/js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
