<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolso Direito - Visão Geral</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../static/styles/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- JS Stack: ordem obrigatória -->
    <script src="../../static/js/database.js"></script>
    <script src="../../static/js/engine.js"></script>
    <script src="../../static/js/ui.js"></script>
    <script src="../../static/js/app.js"></script>
    <script src="../../utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="app-body" data-page="overview">

    <div class="app-shell">
        <header class="app-header">
            <div>
                <p class="greeting">Olá, Usuário!</p>
                <h2>Visão Geral</h2>
            </div>
        </header>

        <section class="balance-card">
            <p>Saldo Disponível</p>
            <h3 id="saldoDisplay">R$ 0,00</h3>
        </section>

        <!-- Alertas de Risco/Atenção injetados pelo ui.js -->
        <div id="alertas-container"></div>

        <section class="bd-card">
            <h4>Despesas por Mês</h4>
            <div class="chart-container">
                <canvas id="barChart"></canvas>
            </div>
        </section>

        <section class="bd-card">
            <h4>Gastos por Categoria</h4>
            <div class="chart-container">
                <canvas id="pieChart"></canvas>
            </div>
        </section>

        <section class="bd-card">
            <p class="transacoes-section-title">Últimas Movimentações</p>
            <ul id="listaTransacoes"></ul>
        </section>
    </div>

    <!-- Componente Global de Rodapé -->
    <bd-footer active-page="overview"></bd-footer>

</body>

</html>
