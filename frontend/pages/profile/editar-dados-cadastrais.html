<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolso Direito - Dados Cadastrais</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../static/styles/style.css">
</head>
<body class="app-body">

    <div class="app-shell">
        <header class="app-header-back">
            <button class="back-btn" id="btn-voltar" onclick="history.back()" aria-label="Voltar">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <h2>Dados Pessoais</h2>
        </header>

        <!-- Avatar + Nome -->
        <div class="profile-header">
            <div class="profile-avatar-container">
                <img src="https://ui-avatars.com/api/?name=Usu%C3%A1rio&background=74ebd5&color=2c3e50&size=150"
                     alt="Foto de Perfil" class="profile-avatar" id="userAvatar">
                <div class="edit-avatar-badge" title="Trocar foto">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                </div>
            </div>
            <div class="edit-input-wrapper" style="flex-grow:1">
                <input class="bd-input" type="text" value="Usuário" id="nomeUser" placeholder="Seu nome">
                <svg class="edit-icon" width="17" height="17" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 20h9"></path>
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                </svg>
            </div>
        </div>

        <form>
            <div class="mb-3">
                <label class="bd-label">E-mail</label>
                <div class="edit-input-wrapper">
                    <input class="bd-input" type="email" value="usuario@email.com" id="emailUser">
                    <svg class="edit-icon" width="17" height="17" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                </div>
            </div>

            <div class="mb-3">
                <label class="bd-label">Celular</label>
                <div class="edit-input-wrapper">
                    <input class="bd-input" type="tel" value="(21) 99999-9999" id="celularUser">
                    <svg class="edit-icon" width="17" height="17" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                </div>
            </div>

            <div class="mb-3">
                <label class="bd-label">Senha</label>
                <div class="edit-input-wrapper">
                    <input class="bd-input" type="password" value="***********" id="senhaUser">
                    <svg class="edit-icon" width="17" height="17" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                </div>
            </div>

            <button type="submit" id="btn-salvar" class="bd-btn-primary mt-2">Salvar Alterações</button>
        </form>
    </div>

    <script src="../../utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
