<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolso Direito - Minhas Transações</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../static/styles/style.css">

    <!-- Scripts Base JS Engine Core OBRIGATÓRIOS para DB e UI funcionarem -->
    <script defer src="../../static/js/database.js"></script>
    <script defer src="../../static/js/ui.js"></script>
    <script defer src="../../static/js/app.js"></script>

    <!-- Script desta Tela Específica (Consumidor Local do JSON DB) -->
    <script defer src="../../static/js/transacoes.js"></script>

    <script defer src="../../utils.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="app-body" data-page="minhas-transacoes">

    <div class="app-shell pb-5">

        <!-- HEADER -->
        <header class="app-header d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2>Minhas Transações</h2>
                <p class="greeting m-0 text-muted" style="font-size: 0.9rem;">Histórico completo da conta</p>
            </div>
        </header>

        <!-- CARD TOTALIZADOR / FILTRO DE MÊS -->
        <section class="bd-card mb-4" style="background: #ffffff; border: 1px solid #eee;">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="d-flex align-items-center gap-2">
                    <div
                        style="background:#e8f5e9; color:#28a745; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="6" width="20" height="12" rx="2"></rect>
                            <path d="M12 12h.01"></path>
                            <path d="M17 12h.01"></path>
                            <path d="M7 12h.01"></path>
                        </svg>
                    </div>
                    <span class="text-secondary" style="font-size: 0.85rem; font-weight: 600;">Balanço do Período</span>
                </div>

                <!-- Botão chamando o Modal de Filtros (O texto e o design interior do botão serão injetados por transacoes.js)-->
                <button class="btn btn-sm btn-light rounded-pill shadow-sm" type="button" data-bs-toggle="modal"
                    data-bs-target="#modalFiltros" id="mesSelectLabel"
                    style="font-size: 0.8rem; font-weight: 500; border: 1px solid #e0e0e0; display:flex; align-items:center; gap: 4px;">
                </button>
            </div>

            <div class="mb-3 d-flex flex-column align-items-start">
                <h3 class="m-0" style="font-size: 2rem;" id="balancoPeriodoDisplay">R$ 0,00</h3>
            </div>

            <div class="d-flex justify-content-between text-sm opacity-75">
                <div class="d-flex align-items-center gap-1">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#b2f2bb" stroke-width="3"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="19" x2="12" y2="5"></line>
                        <polyline points="5 12 12 5 19 12"></polyline>
                    </svg>
                    <span id="receitasDisplay">Receitas: R$ 0,00</span>
                </div>
                <div class="d-flex align-items-center gap-1">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ff8787" stroke-width="3"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <polyline points="19 12 12 19 5 12"></polyline>
                    </svg>
                    <span id="despesasDisplay">Despesas: R$ 0,00</span>
                </div>
            </div>
        </section>

        <!-- LISTAGEM DA ENTIDADE (REPLICANDO O ESTILO DA TELA DE OVERVIEW) -->
        <section class="bd-card">

            <div class="d-flex justify-content-between align-items-center mb-3 mt-2">
                <div class="d-flex align-items-center gap-2">
                    <h4 class="m-0" style="font-size: 1.1rem; color: #333;">Lançamentos</h4>
                    <!-- Badge Visível quando Categoria Filtrada -->
                    <span id="badgeFiltroAtivo" class="badge bg-light text-dark shadow-sm d-none"
                        style="border: 1px solid #ccc; font-size: 0.70rem;">Filtrado</span>
                </div>
            </div>

            <!-- Injetor do CRUD -->
            <ul class="list-unstyled d-flex flex-column gap-2 mb-4" id="listaTransacoesContainer">
                <!-- Dinamicamente renderizado pelo Array Filter JS (ver transacoes.js) -->
            </ul>

        </section>
    </div>

    <!-- MODAL DE FILTRAGEM DE PESQUISA (PERÍODO / CATEGORIA) -->
    <div class="modal fade" id="modalFiltros" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow" style="border-radius: 16px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title" style="font-weight: 700; font-size: 1.1rem;">Filtros de Pesquisa</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body pb-1">

                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold"
                            style="font-size: 0.8rem; text-transform: uppercase;">Período</label>
                        <select class="form-select form-select-sm" id="filtroSelectMes"
                            style="border-radius: 8px; padding: 10px;">
                            <!-- Injetado por transacoes.js -->
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold"
                            style="font-size: 0.8rem; text-transform: uppercase;">Categoria</label>
                        <select class="form-select form-select-sm" id="filtroSelectCategoria"
                            style="border-radius: 8px; padding: 10px;">
                            <option value="Todas as categorias">👉 Mostrar todas as Categorias</option>
                            <option value="Apenas ganhos">💸 Apenas ganhos (receitas)</option>
                            <option value="Apenas gastos">📉 Apenas gastos (despesas)</option>
                            <option disabled>───────────────</option>
                            <option value="Alimentação">🍔 Alimentação</option>
                            <option value="Transporte">🚗 Transporte</option>
                            <option value="Moradia">🏠 Moradia</option>
                            <option value="Saúde">🏥 Saúde</option>
                            <option value="Lazer">🎮 Lazer</option>
                            <option value="Educação">📚 Educação</option>
                            <option value="Vestuário">👕 Vestuário</option>
                            <option value="Assinaturas">📺 Assinaturas</option>
                            <option value="Outros">📦 Outros</option>
                        </select>
                    </div>

                </div>
                <div class="modal-footer border-0 pt-0 d-flex justify-content-between">
                    <button type="button" class="btn btn-light rounded-pill" onclick="limparFiltros()">Limpar
                        filtros</button>
                    <button type="button" class="btn btn-success px-4 rounded-pill fw-bold"
                        onclick="aplicarFiltrosModal()" data-bs-dismiss="modal">Filtrar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DE EDIÇÃO DE TRANSAÇÃO -->
    <div class="modal fade" id="modalEditar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow" style="border-radius: 16px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title" style="font-weight: 700; font-size: 1.1rem;">Editar Transação</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body pb-1">

                    <!-- Nós usamos type="hidden" porque o ID não é uma informação legível que o usuário precise ver (ou possa alterar) ali no Modal, mas é vital para as nossas engrenagens de banco de dados (database.js) saberem exatamente em qual gaveta aplicar as atualizações! -->
                    <!-- Essa técnica é super comum no design de Sistemas Web para transitar variáveis de rastreio entre janelas da interface -->
                    <input type="hidden" id="editTransacaoId">

                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold"
                            style="font-size: 0.8rem; text-transform: uppercase;">Título</label>
                        <input type="text" class="form-control form-control-sm" id="editTransacaoNome"
                            style="border-radius: 8px; padding: 10px;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold"
                            style="font-size: 0.8rem; text-transform: uppercase;">Valor (R$)</label>
                        <!-- Ao declararmos o tipo do input como "number", o próprio navegador já realiza um filtro, não permitindo que o usuário entre com valores que não sejam numéricos -->
                        <input type="number" step="0.01" min="0.01" class="form-control form-control-sm"
                            id="editTransacaoValor" style="border-radius: 8px; padding: 10px;">
                        <small class="text-danger mt-1 fw-bold" id="editAvisoCredito"
                            style="display: none; font-size: 0.70rem;">⚠️ Valores de Crédito (Parcelados) protegidos
                            contra edição.</small>
                    </div>
                    <div class="mb-3" id="editContainerCategoria">
                        <label class="form-label text-muted fw-bold"
                            style="font-size: 0.8rem; text-transform: uppercase;">Categoria</label>
                        <select class="form-select form-select-sm" id="editTransacaoCategoria"
                            style="border-radius: 8px; padding: 10px;">
                            <!-- TODO: Posteriormente, muito provavelmente novas categorias serão criadas pelo usuário, portanto, devemos prever uma forma de adicionar as categorias de forma dinâmica -->
                            <option value="Alimentação">🍔 Alimentação</option>
                            <option value="Transporte">🚗 Transporte</option>
                            <option value="Moradia">🏠 Moradia</option>
                            <option value="Saúde">🏥 Saúde</option>
                            <option value="Lazer">🎮 Lazer</option>
                            <option value="Educação">📚 Educação</option>
                            <option value="Vestuário">👕 Vestuário</option>
                            <option value="Assinaturas">📺 Assinaturas</option>
                            <option value="Outros">📦 Outros</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0 d-flex justify-content-end">
                    <button type="button" class="btn btn-success px-4 rounded-pill fw-bold"
                        onclick="salvarEdicaoModal()" data-bs-dismiss="modal">Salvar Alterações</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Componente Global de Rodapé -->
    <bd-footer active-page="transacoes"></bd-footer>

</body>

</html>
