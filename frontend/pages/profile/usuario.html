<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolso Direito - Meu perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../static/styles/style.css">
    <script defer src="../../static/js/app.js"></script>
    <script defer src="../../static/js/database.js"></script>
    <script defer src="../../utils.js"></script>
    <script defer src="../../static/js/profile.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="app-body">

    <div class="app-shell">
        <header class="app-header">
            <div>
                <p class="greeting">Configurações</p>
                <h2>Perfil</h2>
            </div>
        </header>

        <div class="profile-header">
            <div class="profile-avatar-container position-relative" style="display: inline-block;">
                <img src="https://ui-avatars.com/api/?name=Usu%C3%A1rio&background=74ebd5&color=2c3e50&size=150"
                    alt="Foto de Perfil" class="profile-avatar" id="userAvatar">

                <!-- Overlay Simbólico de Modificação da Foto -->
                <div class="avatar-edit-overlay bg-dark text-white rounded-circle position-absolute d-flex align-items-center justify-content-center"
                    style="bottom: 0; right: 0; width: 25px; height: 25px; cursor: pointer; border: 2px solid #fff;"
                    onclick="alert('Funcionalidade de upload de foto será ativada futuramente!')">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z">
                        </path>
                        <circle cx="12" cy="13" r="4"></circle>
                    </svg>
                </div>
            </div>
            <div class="profile-info">
                <h2 id="nomeUsuario">Usuário</h2>
                <p class="text-bd-success" id="saldoPerfil">Saldo: R$ 0,00</p>
            </div>
        </div>

        <div class="d-flex flex-column gap-3">
            <button class="menu-btn-wide" onclick="window.location.href='../investimentos/lista-investimentos.html'">
                🏦 Minha Carteira de Investimentos
            </button>
            <button class="menu-btn-wide" onclick="window.location.href='../metas/lista-metas.html'">
                🎯 Minhas Metas Financeiras
                <button class="menu-btn-wide" onclick="window.location.href='../transacoes/lista-transacoes.html'">
                    🧾 Minhas Transações
                </button>
                <hr class="bd-divider m-0 border-secondary">
                <button class="menu-btn-wide" id="btn-dados-cadastrais"
                    onclick="window.location.href='editar-dados-cadastrais.html'">
                    Atualizar Dados Cadastrais
                </button>
                <button class="menu-btn-wide" id="btn-dados-financeiros"
                    onclick="window.location.href='editar-dados-financeiros.html'">
                    Atualizar Dados Financeiros
                </button>
                <button class="menu-btn-wide" id="btn-categorias"
                    onclick="window.location.href='categoria-config.html'">
                    Gerenciar Categorias
                </button>
        </div>

        <hr class="bd-divider" style="margin-top: 1rem;">

        <button class="menu-btn-wide danger" id="btn-sair" onclick="window.location.href='../login/login.html'">
            Sair da Conta
        </button>
    </div>

    <!-- Componente Global de Rodapé -->
    <bd-footer active-page="perfil"></bd-footer>

</body>

</html>
