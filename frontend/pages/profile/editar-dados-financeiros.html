<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolso Direito - Dados Financeiros</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../static/styles/style.css">
</head>
<body class="app-body">

    <div class="app-shell">
        <header class="app-header-back">
            <button class="back-btn" id="btn-voltar" onclick="history.back()" aria-label="Voltar">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <h2>Dados Financeiros</h2>
        </header>

        <!-- ===== GANHOS FIXOS ===== -->
        <div class="edit-section">
            <h3>💰 Ganhos Fixos</h3>

            <div class="mb-3">
                <label class="bd-label">Salário</label>
                <div class="edit-input-wrapper">
                    <input class="bd-input" type="text" value="R$ 1.000,00" id="salario">
                    <svg class="edit-icon" width="17" height="17" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                </div>
            </div>

            <div class="mb-3">
                <label class="bd-label">Renda Extra</label>
                <div class="edit-input-wrapper">
                    <input class="bd-input" type="text" value="R$ 300,00" id="rendaExtra">
                    <svg class="edit-icon" width="17" height="17" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                </div>
            </div>

            <button class="btn-add-inline" id="btn-add-ganho" type="button">
                adicionar ganho
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
        </div>

        <hr class="bd-divider">

        <!-- ===== GASTOS FIXOS ===== -->
        <div class="edit-section">
            <h3>💸 Gastos Fixos</h3>

            <div class="mb-3">
                <label class="bd-label">Condomínio / Aluguel</label>
                <div class="edit-input-wrapper">
                    <input class="bd-input" type="text" value="R$ 1.600,00" id="condominio">
                    <svg class="edit-icon" width="17" height="17" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                </div>
            </div>

            <div class="mb-3">
                <label class="bd-label">Seguro</label>
                <div class="edit-input-wrapper">
                    <input class="bd-input" type="text" value="R$ 200,00" id="seguro">
                    <svg class="edit-icon" width="17" height="17" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                </div>
            </div>

            <button class="btn-add-inline" id="btn-add-gasto" type="button">
                adicionar gasto
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
        </div>

        <button type="button" id="btn-salvar" class="bd-btn-primary">Salvar Alterações</button>
    </div>

    <script src="../../utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
