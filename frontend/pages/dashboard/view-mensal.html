<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolso Direito - Resumo Mensal</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../static/styles/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="app-body">

    <div class="app-shell">

        <div class="month-selector">
            <button class="arrow-btn" id="btn-mes-prev" onclick="mudarMes(-1)" aria-label="Mês anterior">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <h2 id="mesAtual">MARÇO</h2>
            <button class="arrow-btn" id="btn-mes-next" onclick="mudarMes(1)" aria-label="Próximo mês">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </div>

        <section class="bd-card">
            <h4>Distribuição de Gastos</h4>
            <div class="chart-container">
                <canvas id="gastosMensaisChart"></canvas>
            </div>
        </section>

        <section class="stats-grid">
            <div class="stat-card">
                <span class="stat-title">Economizou</span>
                <span class="stat-value text-bd-success">R$ 700,00</span>
            </div>
            <div class="stat-card">
                <span class="stat-title">Gasto Total</span>
                <span class="stat-value text-bd-danger">R$ 5.000,00</span>
            </div>
            <div class="stat-card">
                <span class="stat-title">Maior Despesa</span>
                <span class="stat-value">R$ 1.000,00</span>
                <span class="stat-subtitle">(Alimentação)</span>
            </div>
            <div class="stat-card">
                <span class="stat-title">Balanço do Mês</span>
                <span class="stat-value">Positivo</span>
                <span class="stat-subtitle text-bd-success">+ 14%</span>
            </div>
        </section>

    </div>

    <!-- Action Sheet Overlay -->
    <div class="action-sheet-overlay" id="menuOverlay" onclick="toggleMenu()"></div>

    <!-- Action Sheet -->
    <div class="action-sheet" id="actionSheet">
        <h3>O que deseja registrar?</h3>
        <div class="action-grid">
            <button class="action-btn" id="btn-novo-ganho"
                    onclick="window.location.href='../transacoes/teclado-valores.html?tipo=ganho'">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Novo Ganho
            </button>
            <button class="action-btn" id="btn-novo-gasto"
                    onclick="window.location.href='../transacoes/teclado-valores.html?tipo=gasto'">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Novo Gasto
            </button>
            <button class="action-btn" id="btn-importar-extrato"
                    onclick="window.location.href='../upload/extrato-upload.html'">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                Importar Extrato
            </button>
            <button class="action-btn" id="btn-importar-fatura"
                    onclick="window.location.href='../upload/fatura-upload.html'">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="5" width="20" height="14" rx="2"></rect>
                    <line x1="2" y1="10" x2="22" y2="10"></line>
                </svg>
                Importar Fatura
            </button>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <button class="nav-btn active" id="nav-painel" onclick="toggleViews()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            <span>Painel</span>
        </button>

        <button class="nav-btn-add" id="nav-add" onclick="toggleMenu()" aria-label="Adicionar">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        </button>

        <button class="nav-btn" id="nav-perfil"
                onclick="window.location.href='../profile/usuario.html'">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span>Perfil</span>
        </button>
    </nav>

    <script src="../../utils.js"></script>
    <script>
        Chart.defaults.font.family = "'Roboto', sans-serif";

        new Chart(document.getElementById('gastosMensaisChart').getContext('2d'), {
            type: 'pie',
            data: {
                labels: ['Streaming', 'Lazer', 'Transporte', 'Alimentação'],
                datasets: [{
                    data: [300, 1500, 500, 2700],
                    backgroundColor: ['#7f8c8d', '#ACB6E5', '#74ebd5', '#2c3e50'],
                    borderWidth: 2,
                    borderColor: '#ffffff'
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom', labels: { padding: 20, usePointStyle: true } }
                }
            }
        });

        const meses = ['JANEIRO','FEVEREIRO','MARÇO','ABRIL','MAIO','JUNHO',
                        'JULHO','AGOSTO','SETEMBRO','OUTUBRO','NOVEMBRO','DEZEMBRO'];
        let mesIndex = new Date().getMonth();
        document.getElementById('mesAtual').innerText = meses[mesIndex];

        function mudarMes(dir) {
            mesIndex = (mesIndex + dir + 12) % 12;
            document.getElementById('mesAtual').innerText = meses[mesIndex];
        }

        function toggleMenu() {
            document.getElementById('actionSheet').classList.toggle('active');
            document.getElementById('menuOverlay').classList.toggle('active');
        }

        function toggleViews() {
            window.location.href = 'overview.html';
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
