<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Usuário</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Roboto', sans-serif;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg, #6ad8c9, #aab3e8);
        }

        .page-container{
            width:360px;
            min-height:760px;
            background:rgba(255,255,255,0.92);
            border-radius:24px;
            box-shadow:0 10px 35px rgba(0,0,0,0.18);
            display:flex;
            flex-direction:column;
            justify-content:space-between;
            overflow:hidden;
        }

        .content{
            padding:2rem 1.5rem 1rem;
        }

        .profile-header{
            display:flex;
            align-items:center;
            gap:1rem;
            margin-bottom:2rem;
        }

        .profile-image{
            width:84px;
            height:84px;
            border-radius:50%;
            border:4px solid #f37db4;
            object-fit:cover;
            background:#eee;
        }

        .profile-info h2{
            font-size:1.5rem;
            color:#243b53;
            margin-bottom:0.4rem;
        }

        .profile-info p{
            font-size:1.1rem;
            font-weight:700;
            color:#d95f9a;
        }

        .actions{
            display:flex;
            flex-direction:column;
            gap:1rem;
            margin-top:1rem;
        }

        .action-btn{
            display:block;
            width:100%;
            padding:1rem;
            text-align:center;
            text-decoration:none;
            font-size:1rem;
            font-weight:700;
            color:white;
            background:linear-gradient(90deg, #d95f9a, #8f8be8);
            border:none;
            border-radius:14px;
            box-shadow:0 6px 15px rgba(143,139,232,0.25);
            transition:transform 0.2s ease, opacity 0.2s ease;
        }

        .action-btn:hover{
            transform:translateY(-2px);
            opacity:0.95;
        }

        .bottom-nav{
            border-top:1px solid #d9d9d9;
            padding:1rem 0;
            display:flex;
            justify-content:space-around;
            align-items:center;
            background:rgba(255,255,255,0.95);
        }

        .nav-btn{
            text-decoration:none;
            color:#243b53;
            font-size:1.5rem;
            width:52px;
            height:52px;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .nav-btn.center{
            border:2px solid #8f8be8;
            border-radius:50%;
            font-size:2rem;
            color:#8f8be8;
        }

        .nav-btn.user{
            flex-direction:column;
            font-size:0.8rem;
            gap:0.15rem;
        }

        .nav-btn.user span:first-child{
            font-size:1.4rem;
        }
    </style>
</head>
<body>

    <div class="page-container">
        <div class="content">
            <div class="profile-header">
                <img src="https://placehold.co/120x120" alt="Foto do usuário" class="profile-image">

                <div class="profile-info">
                    <h2>Ronilson Silva</h2>
                    <p>Saldo: R$ 999,00</p>
                </div>
            </div>

            <div class="actions">
                <a href="./editar-dados-pessoais.html" class="action-btn">
                    Atualizar dados cadastrais
                </a>

                <a href="./editar-dados-financeiros.html" class="action-btn">
                    Atualizar dados financeiros
                </a>
            </div>
        </div>

        <div class="bottom-nav">
            <a href="./resumo-mensal.html" class="nav-btn">📋</a>
            <a href="./adicionar-gasto.html" class="nav-btn center">＋</a>
            <a href="./profile-config.html" class="nav-btn user">
                <span>👤</span>
                <span>User</span>
            </a>
        </div>
    </div>

</body>
</html>
