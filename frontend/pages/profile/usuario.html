<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolso Direito - Perfil do Usuário</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../static/styles/style.css">
</head>
<body class="app-body">

    <div class="app-shell">
        <header class="app-header">
            <div>
                <p class="greeting">Configurações</p>
                <h2>Perfil</h2>
            </div>
        </header>

        <div class="profile-header">
            <div class="profile-avatar-container">
                <img src="https://ui-avatars.com/api/?name=Usu%C3%A1rio&background=74ebd5&color=2c3e50&size=150"
                     alt="Foto de Perfil" class="profile-avatar" id="userAvatar">
            </div>
            <div class="profile-info">
                <h2 id="nomeUsuario">Usuário</h2>
                <p class="text-bd-success" id="saldoPerfil">Saldo: R$ 0,00</p>
            </div>
        </div>

        <div class="d-flex flex-column gap-3">
            <button class="menu-btn-wide" id="btn-dados-cadastrais"
                    onclick="window.location.href='editar-dados-cadastrais.html'">
                Atualizar Dados Cadastrais
            </button>
            <button class="menu-btn-wide" id="btn-dados-financeiros"
                    onclick="window.location.href='editar-dados-financeiros.html'">
                Atualizar Dados Financeiros
            </button>
            <button class="menu-btn-wide" id="btn-categorias"
                    onclick="window.location.href='categoria-config.html'">
                Gerenciar Categorias
            </button>
        </div>

        <hr class="bd-divider" style="margin-top: 1rem;">

        <button class="menu-btn-wide danger" id="btn-sair"
                onclick="window.location.href='../login/login.html'">
            Sair da Conta
        </button>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <button class="nav-btn" id="nav-painel"
                onclick="window.location.href='../dashboard/overview.html'">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            <span>Painel</span>
        </button>

        <button class="nav-btn-add" id="nav-add"
                onclick="window.location.href='../transacoes/teclado-valores.html'"
                aria-label="Adicionar">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        </button>

        <button class="nav-btn active" id="nav-perfil">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span>Perfil</span>
        </button>
    </nav>

    <script src="../../utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
