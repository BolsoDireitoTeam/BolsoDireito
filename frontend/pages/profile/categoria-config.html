<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolso Direito - Gerenciar Categorias</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../static/styles/style.css">
</head>
<body class="app-body">

    <div class="app-shell">
        <header class="app-header-back">
            <button class="back-btn" id="btn-voltar" onclick="history.back()" aria-label="Voltar">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <h2>Gerenciar Categorias</h2>
        </header>

        <div class="add-category-box">
            <input type="text" id="novaCategoria" placeholder="Nova categoria (ex: Viagem)">
            <button id="btn-add-cat" onclick="adicionarCategoria()" aria-label="Adicionar categoria">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
        </div>

        <h4 class="mb-3" style="color: var(--bd-dark);">Suas Categorias:</h4>

        <div class="category-list" id="listaCategorias"></div>
    </div>

    <script>
        let categorias = ['Lazer', 'Transporte', 'Saúde', 'Alimentação', 'Moradia', 'Outros'];

        function renderizar() {
            const lista = document.getElementById('listaCategorias');
            lista.innerHTML = '';
            categorias.forEach((cat, i) => {
                lista.innerHTML += `
                    <div class="category-item">
                        <span class="category-name">${cat}</span>
                        <button class="cat-action-btn" onclick="remover(${i})" aria-label="Remover ${cat}">
                            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                        </button>
                    </div>`;
            });
        }

        function adicionarCategoria() {
            const input = document.getElementById('novaCategoria');
            const val = input.value.trim();
            if (!val) { alert('Digite um nome para a categoria.'); return; }
            categorias.push(val.charAt(0).toUpperCase() + val.slice(1));
            input.value = '';
            renderizar();
        }

        function remover(i) {
            if (confirm(`Apagar a categoria "${categorias[i]}"?`)) {
                categorias.splice(i, 1);
                renderizar();
            }
        }

        document.getElementById('novaCategoria').addEventListener('keypress', e => {
            if (e.key === 'Enter') adicionarCategoria();
        });

        document.addEventListener('DOMContentLoaded', renderizar);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
