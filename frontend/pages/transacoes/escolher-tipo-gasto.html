<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolso Direito - Tipo de Gasto</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../static/styles/style.css">
</head>
<body class="app-body">

    <div class="app-shell">
        <header class="app-header-back">
            <button class="back-btn" id="btn-voltar" onclick="history.back()" aria-label="Voltar">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <h2 id="categoriaDisplay">Categoria</h2>
        </header>

        <h4 class="text-center mt-2 mb-4" style="color: var(--bd-dark);">Como você pagou?</h4>

        <div class="selection-list">
            <button class="type-btn credit" id="btn-credito" onclick="finalizarGasto('Crédito')">
                Crédito
                <span>Vai para a Fatura</span>
            </button>
            <button class="type-btn debit" id="btn-debito" onclick="finalizarGasto('Débito')">
                Débito
                <span>Sai do Saldo Atual</span>
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cat = localStorage.getItem('categoriaTemporaria');
            if (cat) document.getElementById('categoriaDisplay').innerText = cat;
            else history.back();
        });

        function finalizarGasto(tipo) {
            const valor    = localStorage.getItem('valorTemporario');
            const categoria = localStorage.getItem('categoriaTemporaria');

            const novoGasto = {
                id: Date.now(),
                valor: parseFloat(valor),
                categoria,
                tipo,
                data: new Date().toISOString()
            };

            console.log('Gasto registrado:', novoGasto);
            alert(`✅ Gasto registrado!\n\nValor: R$ ${novoGasto.valor.toFixed(2)}\nCategoria: ${categoria}\nPagamento: ${tipo}`);

            localStorage.removeItem('valorTemporario');
            localStorage.removeItem('categoriaTemporaria');
            window.location.href = '../dashboard/overview.html';
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
