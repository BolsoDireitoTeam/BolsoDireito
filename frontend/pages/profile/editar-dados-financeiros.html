<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolso Direito - Dados Financeiros</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,500,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../static/styles/style.css">
</head>
<body class="dashboard-body">

    <div class="app-container">
        
        <header class="dash-header-back">
            <button class="back-btn" onclick="history.back()">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </button>
            <h2>Editar Dados Financeiros</h2>
        </header>

        <div class="edit-section">
            <h3>Ganhos Fixos</h3>
            
            <div class="input-group">
                <label>Salário</label>
                <div class="edit-input-wrapper">
                    <input type="text" value="R$ 1.000,00">
                    <svg class="edit-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                </div>
            </div>

            <div class="input-group">
                <label>Bolos</label>
                <div class="edit-input-wrapper">
                    <input type="text" value="R$ 300,00">
                    <svg class="edit-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                </div>
            </div>

            <button class="btn-add-inline">
                adicionar ganho
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
        </div>

        <hr style="border: none; border-top: 1px solid rgba(172, 182, 229, 0.4); margin-bottom: 2rem;">

        <div class="edit-section">
            <h3>Gastos Fixos</h3>
            
            <div class="input-group">
                <label>Condomínio</label>
                <div class="edit-input-wrapper">
                    <input type="text" value="R$ 1.600,00">
                    <svg class="edit-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                </div>
            </div>

            <div class="input-group">
                <label>Seguro</label>
                <div class="edit-input-wrapper">
                    <input type="text" value="R$ 1.600,00">
                    <svg class="edit-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                </div>
            </div>

            <button class="btn-add-inline">
                adicionar gasto
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
        </div>

    </div>

    <div id="footer-placeholder"></div>
    <script src="../../utils.js"></script>
</body>
</html>
