<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolso Direito - Criar Conta</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../static/styles/style.css">
</head>
<body class="login-body">

    <div class="login-card">
        <div class="bd-logo">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round" style="transform:rotate(45deg)">
                <rect x="3" y="3" width="18" height="18" rx="4" ry="4"></rect>
            </svg>
        </div>

        <h1>CRIAR CONTA</h1>

        <form id="criarContaForm">
            <div class="mb-3">
                <label class="bd-label" for="usuario">Usuário</label>
                <input class="bd-input" type="text" id="usuario" name="usuario"
                       placeholder="Digite um nome de usuário" required>
            </div>

            <div class="mb-3">
                <label class="bd-label" for="email">E-mail</label>
                <input class="bd-input" type="email" id="email" name="email"
                       placeholder="Digite seu e-mail" required>
            </div>

            <div class="mb-3">
                <label class="bd-label" for="celular">Celular</label>
                <input class="bd-input" type="tel" id="celular" name="celular"
                       placeholder="(XX) XXXXX-XXXX" required>
            </div>

            <div class="mb-3">
                <label class="bd-label" for="senha">Senha</label>
                <input class="bd-input" type="password" id="senha" name="senha"
                       placeholder="Crie uma senha" required>
            </div>

            <div class="mb-3">
                <label class="bd-label" for="confirmar_senha">Confirmar Senha</label>
                <input class="bd-input" type="password" id="confirmar_senha" name="confirmar_senha"
                       placeholder="Repita a senha" required>
            </div>

            <button type="submit" id="btn-criar" class="bd-btn-primary mt-2">Criar Conta</button>
        </form>

        <p class="signup-link">
            Já tem uma conta? <a href="./login.html">Faça o login</a>
        </p>
    </div>

    <script>
        document.getElementById('criarContaForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const senha = document.getElementById('senha').value;
            const confirmar = document.getElementById('confirmar_senha').value;
            if (senha !== confirmar) {
                alert('As senhas não coincidem. Tente novamente!');
                return;
            }
            alert('Conta criada com sucesso!');
            window.location.href = './login.html';
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
