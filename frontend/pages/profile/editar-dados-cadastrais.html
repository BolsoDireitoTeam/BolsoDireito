<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolso Direito - Dados Cadastrais</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,500,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../static/styles/style.css">
</head>
<body class="dashboard-body">

    <div class="app-container">
        
        <header class="dash-header-back">
            <button class="back-btn" onclick="history.back()">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </button>
            <h2>Editar Dados Pessoais</h2>
        </header>

        <div class="profile-header">
            <div class="profile-avatar-container">
                <img src="https://via.placeholder.com/150" alt="Foto de Perfil" class="profile-avatar">
                <div class="edit-avatar-badge">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                </div>
            </div>
            <div class="edit-input-wrapper" style="flex-grow: 1;">
                <input type="text" value="Ronilson Silva" id="nomeUser">
                <svg class="edit-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
            </div>
        </div>

        <form>
            <div class="input-group">
                <label>E-mail</label>
                <div class="edit-input-wrapper">
                    <input type="email" value="ronilson.silva@email.com">
                    <svg class="edit-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                </div>
            </div>

            <div class="input-group">
                <label>Celular</label>
                <div class="edit-input-wrapper">
                    <input type="tel" value="(21) 96767-6767">
                    <svg class="edit-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                </div>
            </div>

            <div class="input-group">
                <label>Senha</label>
                <div class="edit-input-wrapper">
                    <input type="password" value="***********">
                    <svg class="edit-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                </div>
            </div>
            
            <button type="submit" class="btn-primary" style="margin-top: 1rem;">Salvar Alterações</button>
        </form>

    </div>

    <div id="footer-placeholder"></div>
    <script src="../../utils.js"></script>
</body>
</html>
