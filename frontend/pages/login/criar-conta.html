<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolso Direito - Criar Conta</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,500,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../static/styles/style.css"> </head>
<body>
    <div class="login-container">
        <div class="logo">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#2c3e50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform: rotate(45deg);">
                <rect x="3" y="3" width="18" height="18" rx="4" ry="4"></rect>
            </svg>
        </div>
        
        <h2>CRIAR CONTA</h2>
        
        <form id="criarContaForm">
            <div class="input-group">
                <label for="usuario">Usuário</label>
                <input type="text" id="usuario" name="usuario" placeholder="Digite um nome de usuário" required>
            </div>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
            </div>

            <div class="input-group">
                <label for="celular">Celular</label>
                <input type="tel" id="celular" name="celular" placeholder="(XX) XXXXX-XXXX" required>
            </div>
            
            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>
            </div>

            <div class="input-group">
                <label for="confirmar_senha">Confirmar Senha</label>
                <input type="password" id="confirmar_senha" name="confirmar_senha" placeholder="Repita a senha" required>
            </div>
            
            <button type="submit" class="btn-primary">Criar Conta</button>
        </form>
        
        <div class="signup-link">
            Já tem uma conta? <a href="./login.html">Faça o login</a>
        </div>
    </div>

    <script>
        // Lógica de validação básica para criação de conta
        document.getElementById('criarContaForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Impede que a página recarregue ao clicar
            
            const senha = document.getElementById('senha').value;
            const confirmarSenha = document.getElementById('confirmar_senha').value;
            
            // Valida se as senhas digitadas são iguais
            if (senha !== confirmarSenha) {
                alert("As senhas não coincidem. Tente novamente!");
                return; // Para a execução aqui se der erro
            }
            
            // Se as senhas forem iguais, simula o sucesso e manda de volta pro login
            alert("Conta criada com sucesso!");
            window.location.href = './login.html';
        });
    </script>
</body>
</html>
