<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolso Direito - Visão Geral</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../static/styles/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="app-body" data-page="overview">

    <div class="app-shell">
        <header class="app-header">
            <div>
                <p class="greeting">Olá, Usuário!</p>
                <h2>Visão Geral</h2>
            </div>
        </header>

        <section class="balance-card">
            <p>Saldo Disponível</p>
            <h3 id="saldoDisplay">R$ 0,00</h3>
        </section>

        <!-- Alertas de Risco/Atenção injetados pelo ui.js -->
        <div id="alertas-container"></div>

        <section class="bd-card">
            <h4>Despesas por Mês</h4>
            <div class="chart-container">
                <canvas id="barChart"></canvas>
            </div>
        </section>

        <section class="bd-card">
            <h4>Gastos por Categoria</h4>
            <div class="chart-container">
                <canvas id="pieChart"></canvas>
            </div>
        </section>

        <section class="bd-card">
            <p class="extrato-section-title">Últimas Movimentações</p>
            <ul id="listaExtrato"></ul>
        </section>
    </div>

    <!-- Action Sheet Overlay -->
    <div class="action-sheet-overlay" id="menuOverlay" onclick="toggleMenu()"></div>

    <!-- Action Sheet -->
    <div class="action-sheet" id="actionSheet">
        <h3>O que deseja registrar?</h3>
        <div class="action-grid">
            <button class="action-btn" id="btn-novo-ganho"
                    onclick="window.location.href='../transacoes/teclado-valores.html?tipo=ganho'">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Novo Ganho
            </button>
            <button class="action-btn" id="btn-novo-gasto"
                    onclick="window.location.href='../transacoes/teclado-valores.html?tipo=gasto'">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Novo Gasto
            </button>
            <button class="action-btn" id="btn-importar-extrato"
                    onclick="window.location.href='../upload/extrato-upload.html'">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                Importar Extrato
            </button>
            <button class="action-btn" id="btn-importar-fatura"
                    onclick="window.location.href='../upload/fatura-upload.html'">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="5" width="20" height="14" rx="2"></rect>
                    <line x1="2" y1="10" x2="22" y2="10"></line>
                </svg>
                Importar Fatura
            </button>
            <button class="action-btn" id="btn-virar-mes" style="grid-column: 1 / -1;">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"/>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                </svg>
                Virar Mês
            </button>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <button class="nav-btn active" id="nav-painel" onclick="toggleViews()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            <span>Painel</span>
        </button>

        <button class="nav-btn-add" id="nav-add" onclick="toggleMenu()" aria-label="Adicionar">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        </button>

        <button class="nav-btn" id="nav-perfil"
                onclick="window.location.href='../profile/usuario.html'">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span>Perfil</span>
        </button>
    </nav>

    <!-- JS Stack: ordem obrigatória -->
    <script src="../../static/js/database.js"></script>
    <script src="../../static/js/engine.js"></script>
    <script src="../../static/js/ui.js"></script>
    <script src="../../static/js/app.js"></script>
    <script src="../../utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
