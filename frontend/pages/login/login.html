<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolso Direito - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../static/styles/style.css">
</head>
<body class="login-body">

    <div class="login-card">
        <div class="bd-logo">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round" style="transform:rotate(45deg)">
                <rect x="3" y="3" width="18" height="18" rx="4" ry="4"></rect>
            </svg>
        </div>

        <h1>BOLSO DIREITO</h1>

        <form id="loginForm">
            <div class="mb-3">
                <label class="bd-label" for="username">Username ou E-mail</label>
                <input class="bd-input" type="text" id="username" name="username"
                       placeholder="Digite seu usuário" required>
            </div>

            <div class="mb-3">
                <label class="bd-label" for="senha">Senha</label>
                <input class="bd-input" type="password" id="senha" name="senha"
                       placeholder="Digite sua senha" required>
            </div>

            <button type="submit" id="btn-entrar" class="bd-btn-primary mt-2">Entrar</button>
        </form>

        <p class="signup-link">
            Não possui conta? <a href="./criar-conta.html">Criar conta</a>
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const senha = document.getElementById('senha').value;
            if (senha) window.location.href = '../dashboard/overview.html';
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
